<script>
/* ============================================================
   Komorebi — JLPT study app engine
   Data globals expected: VOCAB_N5, VOCAB_N4, VOCAB_N3,
   KANJI_N5, KANJI_N4, KANJI_N3, GRAMMAR_N5, GRAMMAR_N4, GRAMMAR_N3
   (any may be empty arrays)
   ============================================================ */
const G = (n,d)=> (typeof window[n]!=='undefined'? window[n] : d);
const DATA = {
  vocab:{N5:G('VOCAB_N5',[]),N4:G('VOCAB_N4',[]),N3:G('VOCAB_N3',[])},
  kanji:{N5:G('KANJI_N5',[]),N4:G('KANJI_N4',[]),N3:G('KANJI_N3',[])},
  grammar:{N5:G('GRAMMAR_N5',[]),N4:G('GRAMMAR_N4',[]),N3:G('GRAMMAR_N3',[])}
};
const LEVELS=['N5','N4','N3'];
const ITEMS_PER_UNIT=10; // vocab/kanji per unit

/* ---------- Persistence ---------- */
const STORE_KEY='komorebi_v1';
let state=load();
function load(){
  try{const r=localStorage.getItem(STORE_KEY);if(r)return JSON.parse(r);}catch(e){}
  return {srs:{},streak:0,lastStudy:null,unitsDone:{},quizBest:{},totalReviews:0};
}
function save(){try{localStorage.setItem(STORE_KEY,JSON.stringify(state));}catch(e){}}

/* ---------- Streak ---------- */
function todayStr(){return new Date().toISOString().slice(0,10);}
function bumpStreak(){
  const t=todayStr();
  if(state.lastStudy===t)return;
  const y=new Date(Date.now()-864e5).toISOString().slice(0,10);
  state.streak = (state.lastStudy===y)? state.streak+1 : 1;
  state.lastStudy=t;save();
}

/* ---------- SRS (SM-2 lite) ---------- */
// quality: 0 again, 1 hard, 2 good, 3 easy
function srsKey(type,id){return type+':'+id;}
function getSrs(type,id){
  const k=srsKey(type,id);
  return state.srs[k] || {reps:0,interval:0,ease:2.5,due:0,seen:false};
}
function reviewItem(type,id,quality){
  const k=srsKey(type,id);
  let c=getSrs(type,id);
  c.seen=true;
  if(quality===0){c.reps=0;c.interval=0;}
  else{
    c.reps++;
    if(c.reps===1)c.interval=1;
    else if(c.reps===2)c.interval=3;
    else c.interval=Math.round(c.interval*c.ease);
    const adj={1:-0.15,2:0,3:0.15}[quality]||0;
    c.ease=Math.max(1.3,Math.min(2.8,c.ease+adj));
    if(quality===1)c.interval=Math.max(1,Math.round(c.interval*0.6));
  }
  c.due=Date.now()+c.interval*864e5;
  c.last=Date.now();
  state.srs[k]=c;
  state.totalReviews=(state.totalReviews||0)+1;
  bumpStreak();save();
}
function masteryOf(type,id){
  const c=getSrs(type,id);
  if(!c.seen)return 'new';
  if(c.reps>=4&&c.ease>=2.3)return 'mastered';
  if(c.reps>=1)return 'learning';
  return 'new';
}
function intervalLabel(type,id,quality){
  // preview next interval text
  let c=Object.assign({},getSrs(type,id));
  if(quality===0)return '<10m';
  let reps=c.reps+1,iv;
  if(reps===1)iv=1;else if(reps===2)iv=3;else iv=Math.round((c.interval||1)*c.ease);
  if(quality===1)iv=Math.max(1,Math.round(iv*0.6));
  return iv+'d';
}

/* ---------- Helpers ---------- */
function allLearned(){ // items the user has seen at least once, for review pool
  const pool=[];
  ['vocab','kanji','grammar'].forEach(type=>{
    LEVELS.forEach(lv=>DATA[type][lv].forEach(it=>{
      if(getSrs(type,it.id).seen) pool.push({type,lv,it});
    }));
  });
  return pool;
}
function dueItems(){
  const now=Date.now();
  return allLearned().filter(x=>getSrs(x.type,x.it.id).due<=now);
}
function levelUnlocked(lv){
  return true; // N5 review, N4, and N3 all open
}
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2200);}

/* ---------- Units (guided path) ---------- */
// Each level: vocab units + kanji units + grammar units (grouped)
function buildUnits(lv){
  const units=[];
  const v=DATA.vocab[lv],k=DATA.kanji[lv],g=DATA.grammar[lv];
  let n=1;
  for(let i=0;i<v.length;i+=ITEMS_PER_UNIT){
    units.push({id:lv+'_u'+n,n:n++,title:'Vocabulary '+(Math.floor(i/ITEMS_PER_UNIT)+1),type:'vocab',lv,items:v.slice(i,i+ITEMS_PER_UNIT)});
  }
  for(let i=0;i<k.length;i+=ITEMS_PER_UNIT){
    units.push({id:lv+'_u'+n,n:n++,title:'Kanji '+(Math.floor(i/ITEMS_PER_UNIT)+1),type:'kanji',lv,items:k.slice(i,i+ITEMS_PER_UNIT)});
  }
  const gPer=5;
  for(let i=0;i<g.length;i+=gPer){
    units.push({id:lv+'_u'+n,n:n++,title:'Grammar '+(Math.floor(i/gPer)+1),type:'grammar',lv,items:g.slice(i,i+gPer)});
  }
  return units;
}
function unitCount(lv){return buildUnits(lv).length;}
function unitUnlocked(lv,idx,units){
  if(idx===0)return true;
  return (state.unitsDone[lv]||[]).includes(units[idx-1].id);
}
function unitProgress(u){
  const seen=u.items.filter(it=>getSrs(u.type,it.id).seen).length;
  return {seen,total:u.items.length,pct:u.items.length?Math.round(seen/u.items.length*100):0};
}

}

function renderQuizQuestion(){

    subject=it.char;subjClass='k';correct=it.meaning;optKey='meaning';
  }else if(type==='vocab'){
    prompt='What does this word mean?';
    subject=it.kanji;subjClass='w';correct=it.meaning;optKey='meaning';
  }else{
    prompt='What does this grammar pattern mean?';
    subject=it.pattern;subjClass='s';correct=it.meaning;optKey='meaning';
  }
  distract=shuffle(data.filter(x=>x.id!==it.id)).slice(0,3).map(x=>x[optKey]);
  const opts=shuffle([correct,...distract]);
  main.innerHTML=`<div class="view active"><div class="quiz-stage">
    <div class="study-meta"><span>${quiz.type[0].toUpperCase()+quiz.type.slice(1)} quiz · ${quiz.lv}</span><span>${quiz.idx+1} / ${quiz.questions.length}　·　${quiz.score} ✓</span></div>
    <div class="study-progress"><div class="f" style="width:${Math.round(quiz.idx/quiz.questions.length*100)}%"></div></div>
    <div class="quiz-q"><div class="prompt">${prompt}</div><div class="subject ${subjClass}">${subject}</div></div>
    <div class="quiz-opts" id="opts">
      ${opts.map(o=>`<div class="quiz-opt" onclick="answerQuiz(this,${o===correct})" data-correct="${o===correct}">${o}</div>`).join('')}
    </div>
    <div style="text-align:center;margin-top:18px"><span style="font-size:12px;color:var(--ink-faint);cursor:pointer" onclick="quiz=null;setView('quiz')">✕ End quiz</span></div>
  </div></div>`;
}
function answerQuiz(el,isCorrect){
  if(quiz.answered)return;quiz.answered=true;
  const it=quiz.questions[quiz.idx];
  document.querySelectorAll('.quiz-opt').forEach(o=>{
    o.classList.add('disabled');
    if(o.dataset.correct==='true')o.classList.add('correct');
  });
  if(isCorrect){quiz.score++;reviewItem(quiz.type,it.id,2);}
  else{el.classList.add('wrong');reviewItem(quiz.type,it.id,0);}
  setTimeout(()=>{quiz.idx++;quiz.answered=false;renderQuizQuestion();},900);
}
function renderQuizResult(){
  const key=quiz.lv+'_'+quiz.type;
  state.quizBest=state.quizBest||{};
  if(state.quizBest[key]==null||quiz.score>state.quizBest[key]){state.quizBest[key]=quiz.score;}
  bumpStreak();save();
  const s=quiz.score,t=quiz.questions.length;
  const msg=s===t?'満点！Perfect score.':s/t>=0.7?'よくできました — well done.':'いい練習 — keep at it.';
  const savedType=quiz.type;quiz=null;
  main.innerHTML=`<div class="view active"><div class="quiz-stage"><div class="quiz-result">
    <div class="score">${s}/${t}</div><div class="lbl">${msg}</div>
    <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap">
      <button class="btn btn-primary" onclick="startQuiz('${savedType}')">Try again</button>
      <button class="btn btn-ghost" onclick="setView('quiz')">Back to quizzes</button>
    </div>
  </div></div></div>`;
}

/* ---------- Boot ---------- */
document.querySelectorAll('.nav-item').forEach(n=>n.addEventListener('click',()=>setView(n.dataset.view)));
renderDashboard();
</script>
